name: tests

# The template module is written in AQL, so CI builds the `aql` interpreter
# from source before running anything. The CI *logic* lives in this folder as
# scripts (ci/build-aql.sh, ci/run-tests.sh, ci/check-consistency.sh) — this
# workflow just invokes them, so the same steps run locally and in CI. The
# pinned aql commit is single-sourced in ci/aql-ref.
#
# NOTE: this file lives in ci/ and must be promoted to
# .github/workflows/test.yml by someone with `workflow` token scope — see
# ci/README.md. It supersedes the stale .github/workflows/test.yml still on
# main (older, bloom-era, drifted ref).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out template
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # Single source of truth for the pinned aql commit.
      - name: Read pinned aql ref
        id: ref
        run: echo "aql_ref=$(cat ci/aql-ref)" >> "$GITHUB_OUTPUT"

      # The compiled binary only depends on the ref (and the OS), so a cache
      # hit lets ci/build-aql.sh skip the clone + build entirely.
      - name: Cache aql binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/aql
          key: aql-${{ steps.ref.outputs.aql_ref }}-${{ runner.os }}

      # Builds aql at ci/aql-ref (cache miss only), runs every suite, and ends
      # with an advisory `aql check` (non-gating).
      - name: Build aql and run the suites
        run: ci/run-tests.sh

  # Gating three-surface guard: every suite must interpret, `aql check` with
  # zero errors, AND match under the byte compiler (`aql --compile`). run.sh
  # builds its own aql (same pinned ref, via codeload tarball) and is
  # self-contained. See test/divergence/README.md.
  divergence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out template
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: interpreter / check / byte-compiler agreement
        run: test/divergence/run.sh

  # Packaging + pinned-ref single-source-of-truth guard (no aql needed): the
  # plugin must bundle its own copy of the skill, the JSON manifests must
  # parse, and every file that hardcodes the aql commit must echo ci/aql-ref.
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Check out template
        uses: actions/checkout@v4

      - name: Skill drift, JSON manifests, pinned-ref consistency
        run: ci/check-consistency.sh
