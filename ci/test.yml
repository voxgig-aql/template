name: tests

# The bloom-filter module is written in AQL, so CI has to build the
# `aql` interpreter from source before it can run anything. The
# language has no tagged release yet and has shipped breaking changes
# between commits, so we pin AQL_REF to the exact commit this module is
# verified against. Bump it (and re-run the suites locally) when
# adopting a newer aql.
#
# NOTE: this file lives in ci/ and must be promoted to
# .github/workflows/test.yml by someone with `workflow` token scope —
# see ci/README.md. It supersedes the stale .github/workflows/test.yml
# still on main (which pins an older, drifted AQL_REF).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  # aql-lang/aql @ main, 2026-06-24 (PR #182, claude/aql-client-issues-6b8new).
  # Pinned to the exact commit this module is verified against — the build
  # where all five suites interpret, check (0 errors), and compile clean.
  AQL_REF: 407fedad2ea2b30c3dde2f29cfbe60e55f94db4e

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out bloom-filter
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # The compiled binary only depends on AQL_REF (and the OS), so a
      # hit here lets us skip the clone + build entirely.
      - name: Cache aql binary
        id: cache-aql
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/aql
          key: aql-${{ env.AQL_REF }}-${{ runner.os }}

      - name: Check out aql source
        if: steps.cache-aql.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: aql-lang/aql
          ref: ${{ env.AQL_REF }}
          path: aql-src

      # The documented `go install …/cmd/go/aql@latest` cannot work
      # while cmd/go/go.mod carries replace directives, so we build from
      # the clone with -mod=mod instead.
      - name: Build aql
        if: steps.cache-aql.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$HOME/.local/bin"
          cd aql-src/cmd/go
          GOFLAGS=-mod=mod go build \
            -ldflags "-X github.com/aql-lang/aql/cmd/go.Version=${AQL_REF}" \
            -o "$HOME/.local/bin/aql" ./aql

      - name: Add aql to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Report aql version
        run: aql -version

      # Each suite ends with `0 test.fail-count end assert.equal`, so a
      # failure makes aql exit non-zero and fails the step.
      - name: Unit tests (direct)
        run: aql test/bloom_unit_test.aql

      - name: Unit tests (spec format)
        run: aql test/bloom_unit_spec.aql

      - name: Property tests (direct)
        run: aql test/bloom_prop_test.aql

      - name: Property tests (spec format)
        run: aql test/bloom_prop_spec.aql

      - name: Smoke test
        run: aql test/bloom_smoke_test.aql

      # Advisory static check — NOT a gate. Checking bloom.aql ALONE still
      # surfaces false `unused_def`/`no_signature` diagnostics: the library
      # exports its words by reference (`make-bloom/r`, …) so the checker
      # treats the export map as a non-use site and analyses each word body
      # without caller types. (Checked THROUGH a suite — where the words are
      # called with concrete types — `aql check` is clean; the gating
      # `divergence` job below asserts exactly that.) Run with `--soft` +
      # `continue-on-error` so the diagnostics surface without failing the build.
      - name: Static check (advisory, non-gating)
        continue-on-error: true
        run: aql check --soft bloom.aql

  # Gating three-surface guard: every suite must interpret, `aql check` with
  # zero errors, AND match under the byte compiler (`aql --compile`). run.sh
  # builds its own aql (same pinned ref, via codeload tarball) and is
  # self-contained. Safe to gate because the ref is pinned. See
  # test/divergence/README.md.
  divergence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out bloom-filter
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: interpreter / check / byte-compiler agreement
        run: test/divergence/run.sh

  # Lightweight guard for the agent-skill packaging and the pinned-ref single
  # source of truth (no aql needed). The plugin must bundle its own copy of the
  # skill — plugins can't point at an external .claude/skills dir — so two
  # copies exist and can drift; and the aql commit is pinned in several files
  # that must agree.
  consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Check out bloom-filter
        uses: actions/checkout@v4

      - name: SKILL.md copies are in sync
        run: |
          canonical=.claude/skills/bloom-filter-aql/SKILL.md
          bundled=plugins/bloom-filter-aql/skills/bloom-filter-aql/SKILL.md
          if ! diff -u "$canonical" "$bundled"; then
            echo "::error file=$bundled::Plugin skill has drifted from $canonical"
            echo "Fix by copying the canonical skill over the bundled one:"
            echo "  cp $canonical $bundled"
            exit 1
          fi
          echo "SKILL.md copies are identical."

      - name: JSON manifests are valid
        run: |
          for j in .claude-plugin/marketplace.json \
                   plugins/bloom-filter-aql/.claude-plugin/plugin.json \
                   api.json; do
            if python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$j"; then
              echo "ok: $j"
            else
              echo "::error file=$j::invalid JSON"
              exit 1
            fi
          done

      # The pinned aql commit lives in several files; they must agree or a
      # session/CI builds a different interpreter than the one this library is
      # verified against (the exact drift that bit the trie sibling repo).
      # This workflow's env.AQL_REF (full 40-char) is the single source of truth;
      # api.json stores a short prefix, so compare by prefix; test/divergence/run.sh
      # carries its own AQL_BYTECODE_REF that must match too.
      - name: Pinned aql ref is consistent across files
        run: |
          ref='${{ env.AQL_REF }}'
          fail=0
          hook_ref=$(grep -oE 'AQL_REF=[0-9a-f]{7,40}' .claude/hooks/session-start.sh | head -1 | cut -d= -f2)
          if [ "$hook_ref" != "$ref" ]; then
            echo "::error file=.claude/hooks/session-start.sh::AQL_REF=$hook_ref != ci/test.yml AQL_REF=$ref"
            fail=1
          fi
          div_ref=$(grep -oE 'AQL_BYTECODE_REF=[0-9a-f]{7,40}' test/divergence/run.sh | head -1 | cut -d= -f2)
          if [ "$div_ref" != "$ref" ]; then
            echo "::error file=test/divergence/run.sh::AQL_BYTECODE_REF=$div_ref != ci/test.yml AQL_REF=$ref"
            fail=1
          fi
          api_ref=$(python3 -c "import json;print(json.load(open('api.json'))['aql_ref'])")
          if [ "${ref:0:${#api_ref}}" != "$api_ref" ]; then
            echo "::error file=api.json::aql_ref=$api_ref is not a prefix of ci/test.yml AQL_REF=$ref"
            fail=1
          fi
          [ "$fail" = 0 ] && echo "ok: pinned aql ref consistent ($ref; api.json prefix $api_ref)"
          exit $fail
